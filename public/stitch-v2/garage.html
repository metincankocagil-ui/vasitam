<!doctype html>
<html class="dark" lang="tr">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Garajım - Vasıtan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{surface:'#0b1326',panel:'#171f33',primary:'#89ceff',secondary:'#c0c1ff',ink:'#dae2fd',muted:'#9eabbc',danger:'#ffb4ab'}}}}</script>
  <link href="/stitch-v2/theme.css" rel="stylesheet"><script src="/stitch-v2/theme.js"></script><script src="/stitch-v2/demo-listings.js"></script>
  <style>
    body{font-family:Inter,sans-serif;background:radial-gradient(circle at 55% -10%,rgba(137,206,255,.18),transparent 36rem),linear-gradient(180deg,#05070d,#0b1326 48%,#060e20);color:#dae2fd}.glass{background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.11);box-shadow:inset 0 1px rgba(255,255,255,.1),0 24px 60px rgba(0,0,0,.2)}.chip{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09)}html.light body{background:#f3f6fb;color:#172033}.light .glass,.light .chip{background:rgba(255,255,255,.9);border-color:rgba(15,23,42,.12)}select{color-scheme:dark}.light select{color-scheme:light}
  </style>
</head>
<body class="min-h-screen">
  <header class="sticky top-0 z-30 border-b border-white/10 bg-surface/80 backdrop-blur-xl"><div class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4"><a href="/" target="_top" class="flex items-center gap-2 text-2xl font-bold text-primary"><span class="h-2.5 w-2.5 rounded-full bg-primary shadow-[0_0_18px_#89ceff]"></span>Vasıtan</a><nav class="hidden gap-6 md:flex"><a href="/ara" target="_top" class="text-sm text-muted hover:text-primary">İlanlar</a><a href="/karsilastir" target="_top" class="text-sm text-muted hover:text-primary">Karşılaştır</a><span class="border-b-2 border-primary pb-1 text-sm font-semibold text-primary">Garajım</span></nav><button data-theme-toggle type="button" aria-label="Temayı değiştir" class="material-symbols-outlined text-muted hover:text-primary">dark_mode</button></div></header>
  <main class="mx-auto max-w-7xl px-5 py-10">
    <section class="flex flex-col justify-between gap-6 md:flex-row md:items-end"><div><div class="mb-2 text-xs font-semibold uppercase tracking-[.2em] text-primary">ARAÇ KONTROL MERKEZİ</div><h1 class="text-3xl font-semibold md:text-5xl">Garajım</h1><p class="mt-3 text-muted">Araçlarını, sağlık durumlarını ve yaklaşan bakım ihtiyaçlarını yönet.</p></div><div class="flex flex-wrap gap-3"><button id="diagnose-all" class="rounded-full border border-primary/30 px-5 py-3 text-sm font-semibold text-primary hover:bg-primary/10"><span class="material-symbols-outlined mr-1 align-middle text-lg">health_and_safety</span> Tümünü Tara</button><button id="open-add" class="rounded-full bg-primary px-5 py-3 text-sm font-semibold text-surface hover:brightness-110"><span class="material-symbols-outlined mr-1 align-middle text-lg">add</span> Araç Ekle</button></div></section>
    <section class="mt-8 grid gap-4 sm:grid-cols-3"><div class="glass rounded-2xl p-5"><div class="text-sm text-muted">Toplam araç</div><strong id="vehicle-count" class="mt-2 block text-3xl text-primary">0</strong></div><div class="glass rounded-2xl p-5"><div class="text-sm text-muted">Ortalama sağlık</div><strong id="health-average" class="mt-2 block text-3xl text-secondary">—</strong></div><div class="glass rounded-2xl p-5"><div class="text-sm text-muted">Bakım uyarısı</div><strong id="warning-count" class="mt-2 block text-3xl">0</strong></div></section>
    <div id="status" class="mt-6 hidden rounded-2xl border border-primary/20 bg-primary/10 p-4 text-sm text-primary"></div>
    <section id="garage" class="mt-6 grid gap-5 lg:grid-cols-2"></section>
    <section id="empty" class="glass mt-6 hidden rounded-3xl p-12 text-center"><span class="material-symbols-outlined text-6xl text-muted">garage</span><h2 class="mt-4 text-2xl font-semibold">Garajın henüz boş</h2><p class="mt-2 text-muted">Takip etmek istediğin ilk aracı ekleyerek başla.</p><button class="open-add mt-6 rounded-full bg-primary px-5 py-3 font-semibold text-surface">İlk aracı ekle</button></section>
  </main>
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 p-5 backdrop-blur-sm"><div class="glass w-full max-w-lg rounded-3xl p-6"><div class="flex items-center justify-between"><div><div class="text-xs font-semibold tracking-[.18em] text-primary">YENİ ARAÇ</div><h2 class="mt-1 text-2xl font-semibold">Garaja araç ekle</h2></div><button id="close-add" class="material-symbols-outlined text-muted hover:text-primary">close</button></div><label class="mt-6 block"><span class="mb-2 block text-sm text-muted">Araç</span><select id="vehicle-select" class="w-full rounded-xl border border-white/10 bg-panel px-4 py-3 text-ink"></select></label><label class="mt-4 block"><span class="mb-2 block text-sm text-muted">Plaka veya kısa ad (isteğe bağlı)</span><input id="vehicle-label" maxlength="20" placeholder="34 VS 2026" class="w-full rounded-xl border border-white/10 bg-panel px-4 py-3 text-ink"></label><button id="add-vehicle" class="mt-6 w-full rounded-xl bg-primary px-5 py-3 font-semibold text-surface">Garaja Ekle</button></div></div>
  <script>
  (function(){
    var listings=window.VASITAN_DEMO_LISTINGS||[], key='vasitan-garage-v1', defaults=[{id:1,label:'34 VST 01',health:94},{id:20,label:'34 VST 20',health:88}], garage=[];
    try{var saved=localStorage.getItem(key);garage=saved?JSON.parse(saved):defaults}catch(e){garage=defaults}
    function esc(v){return String(v||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function num(v){return new Intl.NumberFormat('tr-TR').format(v)}function save(){try{localStorage.setItem(key,JSON.stringify(garage))}catch(e){}}
    function image(x){return x.images&&x.images[0]&&x.images[0].url||''}function listing(id){return listings.find(function(x){return x.id===Number(id)})}
    function warning(x,g){if(g.health<80)return'Motor ve elektronik sistem kontrolü öneriliyor';if(x.km>80000)return'Periyodik bakım kilometresi yaklaşıyor';return'Kritik bakım ihtiyacı bulunmuyor'}
    function render(){var valid=garage.filter(function(g){return listing(g.id)});garage=valid;var avg=valid.length?Math.round(valid.reduce(function(s,g){return s+g.health},0)/valid.length):0,warnings=valid.filter(function(g){var x=listing(g.id);return g.health<85||x.km>80000}).length;document.getElementById('vehicle-count').textContent=valid.length;document.getElementById('health-average').textContent=valid.length?'%'+avg:'—';document.getElementById('warning-count').textContent=warnings;document.getElementById('empty').classList.toggle('hidden',valid.length>0);
      document.getElementById('garage').innerHTML=valid.map(function(g){var x=listing(g.id),color=g.health>=90?'text-primary':g.health>=80?'text-secondary':'text-danger';return '<article class="glass overflow-hidden rounded-3xl"><div class="relative h-52 bg-panel">'+(image(x)?'<img src="'+esc(image(x))+'" alt="'+esc(x.title)+'" class="h-full w-full object-cover">':'<div class="flex h-full items-center justify-center"><span class="material-symbols-outlined text-6xl text-muted">directions_car</span></div>')+'<span class="absolute right-4 top-4 rounded-full bg-surface/85 px-3 py-1.5 text-sm font-semibold '+color+'">%'+g.health+' sağlık</span></div><div class="p-5 md:p-6"><div class="flex items-start justify-between gap-3"><div><h2 class="text-xl font-semibold">'+esc(x.title)+'</h2><div class="mt-1 text-sm text-muted">'+esc(g.label||x.year+' model')+'</div></div><button data-remove="'+x.id+'" aria-label="Aracı sil" class="material-symbols-outlined text-muted hover:text-danger">delete</button></div><div class="mt-5 grid grid-cols-3 gap-2"><div class="chip rounded-xl p-3"><span class="text-xs text-muted">Kilometre</span><strong class="mt-1 block text-sm">'+num(x.km)+' km</strong></div><div class="chip rounded-xl p-3"><span class="text-xs text-muted">Yakıt</span><strong class="mt-1 block text-sm">'+esc(x.fuel)+'</strong></div><div class="chip rounded-xl p-3"><span class="text-xs text-muted">Model</span><strong class="mt-1 block text-sm">'+x.year+'</strong></div></div><div class="mt-4 flex items-start gap-2 rounded-xl bg-white/[.04] p-3 text-sm text-muted"><span class="material-symbols-outlined text-lg '+color+'">'+(warnings?'build':'check_circle')+'</span><span>'+warning(x,g)+'</span></div><div class="mt-5 flex gap-3"><button data-diagnose="'+x.id+'" class="flex-1 rounded-xl border border-primary/30 px-4 py-2.5 text-sm text-primary hover:bg-primary/10">Tanı Başlat</button><a href="/teknik-veri?id='+x.id+'" target="_top" class="flex-1 rounded-xl border border-white/10 px-4 py-2.5 text-center text-sm text-muted hover:text-primary">Teknik Veri</a></div></div></article>'}).join('');
      document.querySelectorAll('[data-remove]').forEach(function(b){b.onclick=function(){garage=garage.filter(function(g){return g.id!==Number(b.dataset.remove)});save();render()}});document.querySelectorAll('[data-diagnose]').forEach(function(b){b.onclick=function(){diagnose(Number(b.dataset.diagnose))}});save()
    }
    function showStatus(text){var el=document.getElementById('status');el.textContent=text;el.classList.remove('hidden');clearTimeout(showStatus.t);showStatus.t=setTimeout(function(){el.classList.add('hidden')},4500)}
    function diagnose(id){var g=garage.find(function(v){return v.id===id}),x=listing(id);if(!g||!x)return;showStatus(x.title+' tarandı. Sistemler kontrol edildi; sağlık skoru %'+g.health+'. '+warning(x,g)+'.')}
    var modal=document.getElementById('modal'),select=document.getElementById('vehicle-select');select.innerHTML=listings.map(function(x){return '<option value="'+x.id+'">'+esc(x.title)+' ('+x.year+')</option>'}).join('');function open(){modal.classList.remove('hidden');modal.classList.add('flex')}function close(){modal.classList.add('hidden');modal.classList.remove('flex')}document.getElementById('open-add').onclick=open;document.querySelectorAll('.open-add').forEach(function(b){b.onclick=open});document.getElementById('close-add').onclick=close;modal.onclick=function(e){if(e.target===modal)close()};document.getElementById('add-vehicle').onclick=function(){var id=Number(select.value);if(garage.some(function(g){return g.id===id})){showStatus('Bu araç zaten garajında.');close();return}garage.push({id:id,label:document.getElementById('vehicle-label').value.trim(),health:82+(id*7%16)});document.getElementById('vehicle-label').value='';save();close();render();showStatus('Araç garajına eklendi.')};document.getElementById('diagnose-all').onclick=function(){if(!garage.length){open();return}showStatus(garage.length+' araç tarandı. Kritik sistem kontrolleri tamamlandı.')};render();
  })();
  </script>
</body></html>
