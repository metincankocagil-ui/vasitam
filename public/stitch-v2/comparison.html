<!doctype html>
<html class="dark" lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Araç Karşılaştırma - Vasıtan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined&display=swap" rel="stylesheet" />
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{surface:'#0b1326',panel:'#171f33',primary:'#89ceff',secondary:'#c0c1ff',ink:'#dae2fd',muted:'#9eabbc'}}}}</script>
  <link href="/stitch-v2/theme.css" rel="stylesheet" />
  <script src="/stitch-v2/theme.js"></script>
  <script src="/stitch-v2/demo-listings.js"></script>
  <style>
    body{font-family:Inter,sans-serif;background:radial-gradient(circle at 50% -10%,rgba(137,206,255,.18),transparent 34rem),linear-gradient(180deg,#05070d,#0b1326 45%,#060e20);color:#dae2fd}
    .glass{background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.045));border:1px solid rgba(255,255,255,.11);box-shadow:inset 0 1px rgba(255,255,255,.1),0 24px 60px rgba(0,0,0,.22)}
    html.light body{background:#f3f6fb;color:#172033}.light .glass{background:rgba(255,255,255,.9);border-color:rgba(15,23,42,.12)}
    select{color-scheme:dark}.light select{color-scheme:light}
  </style>
</head>
<body class="min-h-screen">
  <header class="sticky top-0 z-20 border-b border-white/10 bg-surface/80 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4">
      <a href="/" target="_top" class="flex items-center gap-2 text-2xl font-bold text-primary"><span class="h-2.5 w-2.5 rounded-full bg-primary shadow-[0_0_18px_#89ceff]"></span>Vasıtan</a>
      <div class="flex items-center gap-3"><a href="/ara" target="_top" class="text-sm text-muted hover:text-primary">İlanlara dön</a><button data-theme-toggle type="button" aria-label="Temayı değiştir" class="material-symbols-outlined text-muted hover:text-primary">dark_mode</button></div>
    </div>
  </header>
  <main class="mx-auto max-w-7xl px-5 py-10">
    <div class="mb-8"><div class="mb-2 text-xs font-semibold uppercase tracking-[.2em] text-primary">ARAÇ ZEKASI</div><h1 class="text-3xl font-semibold md:text-5xl">Araçları yan yana karşılaştır</h1><p class="mt-3 max-w-2xl text-muted">İki ilan seç; fiyat, kilometre, performans ve ekspertiz bilgilerini tek ekranda incele.</p></div>
    <section class="glass grid gap-4 rounded-3xl p-5 md:grid-cols-[1fr_auto_1fr] md:items-end md:p-7">
      <label class="block"><span class="mb-2 block text-sm text-muted">Birinci araç</span><select id="vehicle-a" class="w-full rounded-xl border border-white/10 bg-panel px-4 py-3 text-ink focus:border-primary focus:ring-primary"></select></label>
      <button id="swap" class="mx-auto flex h-11 w-11 items-center justify-center rounded-full border border-primary/30 text-primary hover:bg-primary/10" title="Araçların yerini değiştir"><span class="material-symbols-outlined">swap_horiz</span></button>
      <label class="block"><span class="mb-2 block text-sm text-muted">İkinci araç</span><select id="vehicle-b" class="w-full rounded-xl border border-white/10 bg-panel px-4 py-3 text-ink focus:border-primary focus:ring-primary"></select></label>
    </section>
    <div id="comparison" class="mt-6 overflow-hidden rounded-3xl glass"></div>
  </main>
  <script>
    (function(){
      var list=window.VASITAN_DEMO_LISTINGS||[], a=document.getElementById('vehicle-a'), b=document.getElementById('vehicle-b');
      var query=new URLSearchParams(location.search), initialA=Number(query.get('a'))||1, initialB=Number(query.get('b'))||2;
      function money(v){return new Intl.NumberFormat('tr-TR').format(v)+' TL'}
      function number(v){return new Intl.NumberFormat('tr-TR').format(v)}
      function esc(v){return String(v==null?'—':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
      function image(item){return item.images&&item.images[0]&&item.images[0].url||''}
      function options(selected){return list.map(function(x){return '<option value="'+x.id+'" '+(x.id===selected?'selected':'')+'>'+esc(x.title)+' ('+x.year+')</option>'}).join('')}
      a.innerHTML=options(initialA); b.innerHTML=options(initialB);
      var rows=[['Fiyat',function(x){return money(x.price)}],['Model yılı','year'],['Kilometre',function(x){return number(x.km)+' km'}],['Yakıt','fuel'],['Vites','transmission'],['Kasa tipi','bodyType'],['Motor','engine'],['Güç','power'],['Çekiş','drivetrain'],['Renk','color'],['Hasar kaydı',function(x){return money(x.damageRecord)}],['Boyalı parça','paintedParts'],['Değişen parça','changedParts'],['Satıcı','sellerType'],['Şehir','city'],['AI skoru',function(x){return x.aiScore+'/100'}],['Güven skoru',function(x){return x.trustScore+'/100'}]];
      function value(x,get){return typeof get==='function'?get(x):x[get]}
      function render(){
        var x=list.find(function(i){return i.id===Number(a.value)})||list[0], y=list.find(function(i){return i.id===Number(b.value)})||list[1]; if(!x||!y)return;
        history.replaceState(null,'','?a='+x.id+'&b='+y.id);
        var cards=[x,y].map(function(item){return '<div class="min-w-0 p-5 md:p-7"><div class="aspect-[16/9] overflow-hidden rounded-2xl bg-panel">'+(image(item)?'<img src="'+esc(image(item))+'" alt="'+esc(item.title)+'" class="h-full w-full object-cover">':'<div class="flex h-full items-center justify-center text-muted"><span class="material-symbols-outlined text-5xl">directions_car</span></div>')+'</div><h2 class="mt-4 text-xl font-semibold">'+esc(item.title)+'</h2><div class="mt-2 text-2xl font-bold text-primary">'+money(item.price)+'</div><a target="_top" href="/ilan/'+item.id+'" class="mt-4 inline-flex items-center gap-1 text-sm text-primary hover:underline">İlanı incele <span class="material-symbols-outlined text-base">arrow_forward</span></a></div>'}).join('');
        var table=rows.map(function(row){var vx=value(x,row[1]),vy=value(y,row[1]);return '<div class="grid grid-cols-[1fr_92px_1fr] border-t border-white/10"><div class="p-3 text-right md:p-4">'+esc(vx)+'</div><div class="flex items-center justify-center border-x border-white/10 px-2 text-center text-[11px] font-semibold uppercase tracking-wide text-muted">'+esc(row[0])+'</div><div class="p-3 md:p-4">'+esc(vy)+'</div></div>'}).join('');
        document.getElementById('comparison').innerHTML='<div class="grid grid-cols-2 divide-x divide-white/10">'+cards+'</div>'+table;
      }
      a.addEventListener('change',render);b.addEventListener('change',render);document.getElementById('swap').addEventListener('click',function(){var v=a.value;a.value=b.value;b.value=v;render()});render();
    })();
  </script>
</body>
</html>
